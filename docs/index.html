<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>District 82 &mdash; Pathways Performance Dashboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@600;700;800&family=Source+Sans+3:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="topbar">
  <div class="topbar-inner">
    <div class="brand">
      <img src="assets/PathwaysTypeTreatmentWhite.svg" alt="Toastmasters Pathways" class="brand-logo">
      <div class="brand-divider" aria-hidden="true"></div>
      <div class="brand-text">
        <span class="eyebrow">District 82 &bull; Toastmasters International</span>
        <h1>Pathways Performance Dashboard</h1>
      </div>
    </div>
    <div class="meta-pills">
      <div class="pill" id="pill-updated">
        <span class="pill-label">Snapshot as of</span>
        <span class="pill-value" id="snapshot-date">&mdash;</span>
      </div>
      <div class="pill pill-ghost" id="pill-generated">
        <span class="pill-label">Dashboard built</span>
        <span class="pill-value" id="generated-date">&mdash;</span>
      </div>
    </div>
  </div>
  <nav class="tabs" id="tabs">
    <button class="tab active" data-tab="overview">Overview</button>
    <button class="tab" data-tab="divisions">Divisions</button>
    <button class="tab" data-tab="areas">Areas</button>
    <button class="tab" data-tab="clubs">Clubs</button>
    <button class="tab" data-tab="award">Pathways Quality Award</button>
    <button class="tab" data-tab="downloads">Downloads</button>
    <span class="tab-indicator" id="tab-indicator"></span>
  </nav>
</div>

<main id="app">
  <div class="loading" id="loading">
    <div class="skeleton skeleton-title"></div>
    <div class="skeleton-kpis">
      <div class="skeleton skeleton-box"></div>
      <div class="skeleton skeleton-box"></div>
      <div class="skeleton skeleton-box"></div>
      <div class="skeleton skeleton-box"></div>
      <div class="skeleton skeleton-box"></div>
    </div>
    <div class="skeleton skeleton-chart"></div>
  </div>
</main>

<template id="tpl-overview">
  <section class="panel" data-panel="overview">
    <div class="kpi-row" id="kpi-row"></div>
    <div class="grid-2">
      <div class="card">
        <h2>District-Wide Level Composition</h2>
        <div class="chart-wrap"><canvas id="chart-district-levels"></canvas></div>
      </div>
      <div class="card">
        <h2>Division Leaderboard <span class="card-sub">Total levels completed</span></h2>
        <div class="chart-wrap"><canvas id="chart-division-leaderboard"></canvas></div>
      </div>
    </div>
    <div class="card">
      <h2>District Summary <span class="card-sub">Every level counts toward the total shown here</span></h2>
      <p class="legend-note">
        <span class="swatch swatch-l1"></span>Level 1
        <span class="swatch swatch-l2"></span>Level 2
        <span class="swatch swatch-l3"></span>Level 3
        <span class="swatch swatch-l4"></span>Level 4+ / Path / DTM
      </p>
    </div>
  </section>
</template>

<template id="tpl-divisions">
  <section class="panel" data-panel="divisions">
    <div class="card">
      <h2>Division Leaderboard <span class="card-sub">Click a division to see its area &amp; club breakdown</span></h2>
      <div id="division-accordion"></div>
    </div>
  </section>
</template>

<template id="tpl-areas">
  <section class="panel" data-panel="areas">
    <div class="card">
      <div class="card-header-row">
        <h2>Area Leaderboards <span class="card-sub">Ranked within each division &middot; click an area for its club-by-club breakdown</span></h2>
        <select id="area-division-filter" class="select"></select>
      </div>
      <div id="areas-content"></div>
    </div>
  </section>
</template>

<template id="tpl-clubs">
  <section class="panel" data-panel="clubs">
    <div class="club-lb-banner">
      <div class="club-lb-banner-title">Two Club Leaderboards</div>
      <ol class="club-lb-banner-list">
        <li>
          <b>Total Levels</b> &mdash; ranks by total levels completed. When totals are tied, in order:
          <ol type="a">
            <li>Levels completed per active member</li>
            <li>Combined Level&nbsp;1 + Level&nbsp;3 completions</li>
          </ol>
        </li>
        <li>
          <b>Levels per Member</b> &mdash; ranks by levels completed per active member, a fairer
          measure for smaller clubs. When this ratio is tied:
          <ol type="a">
            <li>Combined Level&nbsp;1 + Level&nbsp;3 completions</li>
          </ol>
        </li>
      </ol>
      <div class="club-lb-banner-note">
        Clubs tied on every tiebreaker above share the same rank (e.g. 1, 2, 2, 3 &mdash; not 1, 2, 2, 4).
      </div>
    </div>
    <div class="card">
      <div class="card-header-row">
        <h2>Club Leaderboard <span class="card-sub" id="club-lb-subtitle">District-wide, ranked by total levels completed &middot; click a club name for its full breakdown</span></h2>
        <input type="search" id="club-search" class="select" placeholder="Search club name&hellip;">
      </div>
      <div class="club-lb-tabs" id="club-lb-tabs">
        <button class="club-lb-tab active" data-mode="total">Total Levels</button>
        <button class="club-lb-tab" data-mode="per_member">Levels per Member</button>
      </div>
      <p class="legend-note">
        <span class="swatch swatch-l1"></span>Level 1
        <span class="swatch swatch-l2"></span>Level 2
        <span class="swatch swatch-l3"></span>Level 3
        <span class="swatch swatch-l4"></span>Level 4+ / Path / DTM
      </p>
      <p class="legend-note">
        <b>DCP status:</b>
        <span class="dcp-badge dcp-D">D</span>Distinguished
        <span class="dcp-badge dcp-S">S</span>Select Distinguished
        <span class="dcp-badge dcp-P">P</span>President's Distinguished
        <span class="dcp-badge dcp-M">M</span>Smedley Distinguished
      </p>
      <div id="club-leaderboard"></div>
    </div>
  </section>
</template>

<template id="tpl-award">
  <section class="panel" data-panel="award">
    <div id="award-disclaimer" class="award-banner"></div>
    <div class="card award-intro">
      <h2>Pathways Quality Award</h2>
      <p>
        <strong>Star</strong> requires at least 3 Level&nbsp;1 and 2 Level&nbsp;3 completions by Dec&nbsp;31, 2026.
        <strong>Excellence</strong> requires at least 4 Level&nbsp;1 and 3 Level&nbsp;3 completions by Dec&nbsp;31, 2026.
        Clubs achieving Excellence are not also counted for Star.
      </p>
    </div>
    <div class="grid-2">
      <div class="card">
        <h2><span class="ribbon-dot ribbon-excellence"></span>Excellence Tier <span class="card-sub" id="excellence-count"></span></h2>
        <div id="award-excellence"></div>
      </div>
      <div class="card">
        <h2><span class="ribbon-dot ribbon-star"></span>Star Tier <span class="card-sub" id="star-count"></span></h2>
        <div id="award-star"></div>
      </div>
    </div>
    <div id="award-close-section"></div>
  </section>
</template>

<template id="tpl-downloads">
  <section class="panel" data-panel="downloads">
    <div class="card">
      <h2>Officer Breakdown Downloads</h2>
      <p class="card-sub" style="margin-bottom:16px;display:block;">
        Pick your role and unit, preview the report right here, then download the PDF or Excel when you're ready.
      </p>
      <div class="download-role-tabs" id="download-role-tabs">
        <button class="role-tab active" data-role="district">District Director</button>
        <button class="role-tab" data-role="division">Division Director</button>
        <button class="role-tab" data-role="area">Area Director</button>
        <button class="role-tab" data-role="club">Club President</button>
      </div>
      <div id="download-picker" class="download-picker"></div>
      <div id="download-links" class="download-links"></div>
      <div id="preview-pane" class="preview-pane"></div>
    </div>
  </section>
</template>

<script src="vendor/chart.umd.js"></script>
<script src="vendor/xlsx.full.min.js"></script>
<script src="app.js"></script>
</body>
</html>
